<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOORS | Генератор разборов Daily Run</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --accent: #d4af37;
            --accent-hover: #b5952f;
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --border: #29292e;
            --success: #04d361;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        h1 {
            color: var(--accent);
            text-align: center;
            grid-column: 1 / -1;            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .row {            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .toggle-group:hover {
            border-color: var(--accent);
        }

        .toggle-group label {
            margin: 0;
            color: var(--text-main);
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .toggle-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .qty-input {
            width: 60px !important;
            margin-left: 10px;
            text-align: center;
        }

        .qty-input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .section-title {            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 15px 0;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 500px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">    <h1>✦ 𝘿𝘼𝙄𝙇𝙔 𝙍𝙐𝙉 𝙂𝙀𝙉𝙀𝙍𝘼𝙏𝙊𝙍 ✦</h1>

    <!-- ФОРМА ВВОДА -->
    <div class="card">
        <h2>⚙️ Параметры забега</h2>
        
        <div class="row">
            <div class="form-group">
                <label>Номер рана (Daily Run)</label>
                <input type="number" id="runNumber" value="161" min="1">
            </div>
            <div class="form-group">
                <label>Количество комнат</label>
                <input type="number" id="roomCount" value="20" min="1">
            </div>
        </div>

        <div class="section-title">🗺️ Этажи</div>
        <div class="toggle-group">
            <label for="floorHotel">The Hotel</label>
            <input type="checkbox" id="floorHotel" checked>
        </div>
        <div class="toggle-group">
            <label for="floorMines">The Mines</label>
            <input type="checkbox" id="floorMines" checked>
        </div>
        <div class="toggle-group">
            <label for="floorBackdoor">Подэтаж: The Backdoor</label>
            <input type="checkbox" id="floorBackdoor" checked>
        </div>

        <div class="section-title">⏱️ Время прохождения</div>
        <div class="row">
            <div class="form-group">
                <label>Минуты</label>
                <input type="number" id="timeMin" value="2" min="0">
            </div>
            <div class="form-group">
                <label>Секунды</label>
                <input type="number" id="timeSec" value="50" min="0" max="59">
            </div>
        </div>

        <div class="section-title">🩸 Сущности (отметьте присутствующих)</div>
        <div id="entitiesList"></div>

        <div class="section-title">🔦 Предметы (отметьте и укажите кол-во)</div>
        <div id="itemsList"></div>
    </div>
    <!-- ПРЕВЬЮ И ВЫВОД -->
    <div class="card">
        <h2>📋 Готовый текст</h2>
        <textarea id="output" readonly></textarea>
        <button type="button" class="btn" onclick="copyToClipboard()" id="copyBtn">📋 Скопировать в буфер обмена</button>
    </div>
</div>

<script>
    // === НАСТРОЙКИ: СПИСКИ ===
    const entitiesList = [
        "Раш", "Блитз", "Глаза", "Вакуум", "Хайд", 
        "Дюп", "Снейр", "Мракомыши", "Скрич", "Гиггл", "Дред"
    ];

    const itemsList = [
        "Крест", "Отмычки", "Фонарик", "Люминесцентная палочка", 
        "Лазерная указка", "Пиво (Смузи)", "Скелетный ключ", 
        "Батарейки", "Пластыри", "Пачка пластырей"
    ];

    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function declension(number, titles) {
        const cases = [2, 0, 1, 1, 1, 2];
        return titles[(number % 100 > 4 && number % 100 < 20) ? 2 : cases[(number % 10 < 5) ? number % 10 : 5]];
    }

    function formatTime(min, sec) {
        const minStr = declension(min, ['минута', 'минуты', 'минут']);
        const secStr = declension(sec, ['секунда', 'секунды', 'секунд']);
        return `${min} ${minStr} ${sec} ${secStr}`;
    }

    // === ГЕНЕРАЦИЯ ТЕКСТА ===
    function generateText() {
        const runNum = document.getElementById('runNumber').value || '1';
        const rooms = document.getElementById('roomCount').value || '0';
        
        const hotel = document.getElementById('floorHotel').checked ? "The Hotel" : "Нет";
        const mines = document.getElementById('floorMines').checked ? "The Mines" : "Нет";
        const backdoor = document.getElementById('floorBackdoor').checked ? "The Backdoor" : "Нет";

        const min = parseInt(document.getElementById('timeMin').value) || 0;
        const sec = parseInt(document.getElementById('timeSec').value) || 0;
        const timeText = formatTime(min, sec);

        // Собираем только отмеченные сущности
        let entitiesText = "";
        document.querySelectorAll('.entity-check:checked').forEach(chk => {
            entitiesText += `⋄ ${chk.dataset.name}\n`;        });
        if (entitiesText === "") entitiesText = "⋄ Нет\n";

        // Собираем только отмеченные предметы
        let itemsText = "";
        document.querySelectorAll('.item-check:checked').forEach(chk => {
            const idx = chk.dataset.index;
            const qty = document.getElementById(`item_qty_${idx}`).value;
            const name = chk.closest('.toggle-group').querySelector('label').innerText;
            
            if (qty > 1) {
                itemsText += `⋄ ${name} (${qty})\n`;
            } else {
                itemsText += `⋄ ${name}\n`;
            }
        });
        if (itemsText === "") itemsText = "⋄ Нет\n";

        const finalText = `✦ㅤ ㅤ  𝘿𝘼𝙄𝙇𝙔 𝙍𝙐𝙉  |  ${runNum}

⟪───⟡═══🔥═══⟡───⟫

🚪ㅤ ㅤ Комнаты

⋄ ${rooms} ${declension(rooms, ['комната', 'комнаты', 'комнат'])}. Этажи – ${hotel}; ${mines}, подэтаж – ${backdoor}.

⟪───⟡────────⟡───⟫

⏰ㅤ ㅤ Время прохождения

⋄ В среднем ${timeText}.

⟪───⟡────────⟡───⟫

🩸ㅤ ㅤ Сущности

${entitiesText.trim()}

⟪───⟡────────⟡───⟫

🔦ㅤ ㅤ Предметы

${itemsText.trim()}

⟪───⟡═══🔥═══⟡───⟫

➤ Подписаться на ɢᴜɪᴅɪɴɢ ʟɪɢʜᴛ || ᴅᴏᴏʀs ɴᴇᴡs

#Roblox
#Doors #RobloxDoors  #Daily_Run`;
        document.getElementById('output').value = finalText;
    }

    // === НАДЕЖНОЕ КОПИРОВАНИЕ (РАБОТАЕТ В FILE://) ===
    function copyToClipboard() {
        const text = document.getElementById('output').value;
        
        // Создаем временный невидимый элемент textarea
        const tempTextArea = document.createElement('textarea');
        tempTextArea.value = text;
        tempTextArea.style.position = 'fixed';
        tempTextArea.style.left = '-9999px';
        tempTextArea.style.top = '-9999px';
        tempTextArea.style.opacity = '0';
        document.body.appendChild(tempTextArea);
        
        tempTextArea.focus();
        tempTextArea.select();
        
        try {
            // Старый, но самый надежный метод для локальных файлов в Chrome
            const successful = document.execCommand('copy');
            if (successful) {
                showCopySuccess();
            } else {
                alert('Не удалось скопировать автоматически. Пожалуйста, выделите текст вручную и нажмите Ctrl+C');
            }
        } catch (err) {
            console.error('Ошибка копирования:', err);
            alert('Ваш браузер блокирует автоматическое копирование. Пожалуйста, выделите текст вручную и нажмите Ctrl+C');
        }
        
        document.body.removeChild(tempTextArea);
    }

    function showCopySuccess() {
        const btn = document.getElementById('copyBtn');
        const originalText = btn.innerText;
        btn.innerText = "✅ Скопировано!";
        btn.style.backgroundColor = "var(--success)";
        btn.style.color = "#fff";
        
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.backgroundColor = "var(--accent)";
            btn.style.color = "#000";
        }, 2000);
    }
    // === ИНИЦИАЛИЗАЦИЯ ===
    function init() {
        // 1. Генерируем список сущностей (безопасный метод)
        const entContainer = document.getElementById('entitiesList');
        let entHtml = '';
        entitiesList.forEach((ent, index) => {
            entHtml += `
                <div class="toggle-group">
                    <label for="ent_${index}">${ent}</label>
                    <input type="checkbox" id="ent_${index}" class="entity-check" data-name="${ent}">
                </div>
            `;
        });
        entContainer.innerHTML = entHtml;

        // 2. Генерируем список предметов (безопасный метод)
        const itemContainer = document.getElementById('itemsList');
        let itemHtml = '';
        itemsList.forEach((item, index) => {
            itemHtml += `
                <div class="toggle-group">
                    <label for="item_chk_${index}">${item}</label>
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="item_chk_${index}" class="item-check" data-index="${index}">
                        <input type="number" id="item_qty_${index}" class="qty-input" value="1" min="1" disabled>
                    </div>
                </div>
            `;
        });
        itemContainer.innerHTML = itemHtml;

        // 3. Привязываем события ПОСЛЕ создания всех элементов
        document.querySelectorAll('.item-check').forEach(chk => {
            chk.addEventListener('change', (e) => {
                const qtyInput = document.getElementById(`item_qty_${e.target.dataset.index}`);
                qtyInput.disabled = !e.target.checked;
                if (!e.target.checked) qtyInput.value = 1;
                generateText();
            });
        });

        // 4. Глобальный слушатель на все поля ввода для мгновенного обновления
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', generateText);
            input.addEventListener('change', generateText);
        });

        // 5. Первичная генерация
        generateText();
    }
    // Запуск при загрузке страницы
    init();
</script>

</body>
</html>
