<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOORS | Генератор для Друга (Everyday Run)</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --accent: #d4af37;
            --accent-hover: #b5952f;
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --border: #29292e;
            --success: #04d361;
            --disabled: #323238;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        h1 {
            color: var(--accent);
            text-align: center;
            grid-column: 1 / -1;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .step-progress {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .step-content {
            display: none;
            flex-grow: 1;
        }

        .step-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .toggle-group:hover {
            border-color: var(--accent);
        }

        .toggle-group label {
            margin: 0;
            color: var(--text-main);
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .toggle-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .section-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 10px 0;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 540px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.5;
        }

        .controls-nav {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: var(--disabled);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--border);
            color: var(--accent);
        }
        
        .scroll-container {
            max-height: 360px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✦ 𝙀𝙑𝙀𝙍𝙔𝘿𝘼𝙔 𝙍𝙐𝙉 𝙂𝙀𝙉𝙀𝙍𝘼𝙏𝙊𝙍 ✦</h1>

    <div class="card">
        <div>
            <div class="step-progress" id="stepIndicator">Шаг 1 из 5</div>
            
            <div class="step-content active" data-step="1">
                <h2>🔢 Базовая информация</h2>
                <div class="form-group">
                    <label for="runNumber">Номер забега (Daily Run)</label>
                    <input type="number" id="runNumber" value="140" min="1">
                </div>
                <div class="form-group">
                    <label for="roomCount">Пройдено дверей</label>
                    <input type="number" id="roomCount" value="30" min="0">
                </div>
            </div>

            <div class="step-content" data-step="2">
                <h2>🗺️ Локации забега</h2>
                <div class="section-title">Этаж</div>
                <div id="floorsList"></div>
                
                <div class="section-title">Подэтаж</div>
                <div id="subFloorsList"></div>
            </div>

            <div class="step-content" data-step="3">
                <h2>🩸 Кто напал?</h2>
                <label>Отметь встреченных сущностей (без количества):</label>
                <div class="scroll-container">
                    <div id="entitiesList"></div>
                </div>
            </div>

            <div class="step-content" data-step="4">
                <h2>🔦 Найденный лут</h2>
                <div class="scroll-container">
                    <div class="section-title">Предметы</div>
                    <div id="itemsList"></div>
                    
                    <div class="section-title">Дополнительно</div>
                    <div id="additionalList"></div>
                </div>
            </div>

            <div class="step-content" data-step="5">
                <h2>✨ Финальные детали</h2>
                <div class="form-group">
                    <label for="interestingText">Из интересного:</label>
                    <input type="text" id="interestingText" value="Ящики с лианами">
                </div>
                <div class="form-group">
                    <label for="speedrunText">Лучшее время для спидрана:</label>
                    <input type="text" id="speedrunText" value="6 минут">
                </div>
                <div class="form-group">
                    <label for="rewardText">Награда за сегодня:</label>
                    <input type="text" id="rewardText" value="1">
                </div>
            </div>
        </div>

        <div class="controls-nav">
            <button type="button" class="btn btn-secondary" id="prevBtn" onclick="changeStep(-1)" disabled>⬅️ Назад</button>
            <button type="button" class="btn" id="nextBtn" onclick="changeStep(1)">Далее ➡️</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Живое Превью поста</h2>
        <textarea id="output" readonly></textarea>
        <button type="button" class="btn" onclick="copyToClipboard()" id="copyBtn">📋 Скопировать разбор</button>
    </div>
</div>

<script>
    // === МАССИВЫ ДАННЫХ ДЛЯ ДРУГА (СЮДА ОН СМОЖЕТ ДОБАВЛЯТЬ СВОИХ) ===
    const floorsList = ["Hotel/Отель", "Mines/Шахты"];
    const subFloorsList = ["Backdoor/Бекдор", "Rooms/Комнаты", "Outdoors/Улица"];
    
    const entitiesList = [
        "Газ", "Вакуум", "Хайд", "Дред", "Скрич", "Гиггл", "Дюп", "Раш", "Амбуш", "Блитз", "Глаза", "Лукмен", "Снейр", "Мракомыши", "Фигура", "Халт", "Луи", "Тимоти", "Салли"
    ];

    const itemsList = [
        "Крест", "Отмычки", "Нагрудный фонарик", "Фонарик", "Прожектор", "Фонарь", "Зажигалка", "Свечка", "Люминесцентная палочка", "Лазерная указка", "Пиво (Смузи)", "Скелетный ключ", "Витамины", "Хлеб", "Пончик", "Алоэ", "Пачка батареек", "Пачка пластырей", "Банка для чаевых", "Из-за Луи также возможны другие предметы"
    ];

    const additionalList = ["Батарейки", "Пластыри"];

    let currentStep = 1;
    const totalSteps = 5;

    // === НАВИГАЦИЯ СЛАЙДЕРА ===
    function changeStep(direction) {
        document.querySelector(`.step-content[data-step="${currentStep}"]`).classList.remove('active');
        currentStep += direction;
        document.querySelector(`.step-content[data-step="${currentStep}"]`).classList.add('active');
        
        document.getElementById('stepIndicator').innerText = `Шаг ${currentStep} из ${totalSteps}`;
        document.getElementById('prevBtn').disabled = (currentStep === 1);
        document.getElementById('nextBtn').innerText = (currentStep === totalSteps) ? "Готово 🎉" : "Далее ➡️";
        
        generateText();
    }

    // === СБОРКА ТЕКСТА ПО КАНОНИЧНОМУ ШАБЛОНУ ДРУГА ===
    function generateText() {
        const runNum = document.getElementById('runNumber').value || '140';
        const rooms = document.getElementById('roomCount').value || '30';
        
        // Сбор основных этажей (через слэш)
        let floorsArr = [];
        document.querySelectorAll('.floor-check:checked').forEach(chk => floorsArr.push(chk.dataset.name));
        let floorsText = floorsArr.join('/') || "——";
        
        // Сбор подэтажей (через слэш, если пусто — "——")
        let subFloorsArr = [];
        document.querySelectorAll('.subfloor-check:checked').forEach(chk => subFloorsArr.push(chk.dataset.name));
        let subfloorsText = subFloorsArr.join('/') || "——";

        // Сбор сущностей (каждая с новой строки + пробел в начале)
        let entitiesText = "";
        document.querySelectorAll('.entity-check:checked').forEach(chk => {
            entitiesText += ` ${chk.dataset.name}\n`;
        });
        if (entitiesText === "") entitiesText = " ——\n";

        // Сбор предметов (чистый список без количества + пробел в начале)
        let itemsText = "";
        document.querySelectorAll('.item-check:checked').forEach(chk => {
            itemsText += ` ${chk.dataset.name}\n`;
        });
        if (itemsText === "") itemsText = " ——\n";

        // Сбор дополнительного лута (+ пробел в начале)
        let additionalText = "";
        document.querySelectorAll('.additional-check:checked').forEach(chk => {
            additionalText += ` ${chk.dataset.name}\n`;
        });
        if (additionalText === "") additionalText = " ——\n";

        // Новые текстовые поля шага 5
        const interestingText = document.getElementById('interestingText').value || "——";
        const speedrunText = document.getElementById('speedrunText').value || "——";
        const rewardText = document.getElementById('rewardText').value || "——";

        // ЖЕСТКИЙ ШАБЛОН ДРУГА (сохраняет все пустые строки и тройные пробелы после двоеточий)
        const finalText = ` ЕЖЕДНЕВНЫЙ ЗАБЕГ | #${runNum}


 Двери:   ${rooms}



 Этаж:   ${floorsText}

 Подэтаж:   ${subfloorsText}



 Сущности:
${entitiesText.trimEnd()}



 Предметы:
${itemsText.trimEnd()}

 Дополнительно:
${additionalText.trimEnd()}



 Из интересного:
${interestingText}



 Лучшее время для спидрана:
${speedrunText}



 Награда:
${rewardText}


#Roblox #Doors #RobloxDoors
#Everyday #DailyRun #Review
 Посетить Гнездо`;

        document.getElementById('output').value = finalText;
    }

    // === СТАНДАРТНОЕ КОПИРОВАНИЕ ===
    function copyToClipboard() {
        const text = document.getElementById('output').value;
        const tempTextArea = document.createElement('textarea');
        tempTextArea.value = text;
        tempTextArea.style.position = 'fixed';
        tempTextArea.style.left = '-9999px';
        document.body.appendChild(tempTextArea);
        tempTextArea.focus();
        tempTextArea.select();
        
        try {
            if (document.execCommand('copy')) {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Успешно скопировано!";
                btn.style.backgroundColor = "var(--success)";
                btn.style.color = "#fff";
                setTimeout(() => {
                    btn.innerText = "📋 Скопировать разбор";
                    btn.style.backgroundColor = "var(--accent)";
                    btn.style.color = "#000";
                }, 1500);
            }
        } catch (err) {
            alert('Ошибка копирования. Выдели текст справа руками.');
        }
        document.body.removeChild(tempTextArea);
    }

    // === ИНИЦИАЛИЗАЦИЯ И РЕНДЕР ИНТЕРФЕЙСА ===
    function init() {
        // Шаг 2: Этажи
        document.getElementById('floorsList').innerHTML = floorsList.map((fl, i) => `
            <div class="toggle-group">
                <label for="floor_${i}">${fl}</label>
                <input type="checkbox" id="floor_${i}" class="floor-check" data-name="${fl}" ${fl.includes("Mines") ? "checked" : ""}>
            </div>
        `).join('');

        // Шаг 2: Подэтажи
        document.getElementById('subFloorsList').innerHTML = subFloorsList.map((sf, i) => `
            <div class="toggle-group">
                <label for="subfloor_${i}">${sf}</label>
                <input type="checkbox" id="subfloor_${i}" class="subfloor-check" data-name="${sf}">
            </div>
        `).join('');

        // Шаг 3: Сущности
        document.getElementById('entitiesList').innerHTML = entitiesList.map((ent, i) => `
            <div class="toggle-group">
                <label for="ent_${i}">${ent}</label>
                <input type="checkbox" id="ent_${i}" class="entity-check" data-name="${ent}">
            </div>
        `).join('');

        // Шаг 4: Предметы
        document.getElementById('itemsList').innerHTML = itemsList.map((item, i) => `
            <div class="toggle-group">
                <label for="item_${i}">${item}</label>
                <input type="checkbox" id="item_${i}" class="item-check" data-name="${item}">
            </div>
        `).join('');

        // Шаг 4: Дополнительно
        document.getElementById('additionalList').innerHTML = additionalList.map((add, i) => `
            <div class="toggle-group">
                <label for="add_${i}">${add}</label>
                <input type="checkbox" id="add_${i}" class="additional-check" data-name="${add}">
            </div>
        `).join('');

        // Подвязываем автообновление превью ко ВСЕМ полям ввода
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', generateText);
            input.addEventListener('change', generateText);
        });

        generateText();
    }

    window.onload = init;
</script>

</body>
</html>
